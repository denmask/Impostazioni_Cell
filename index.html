<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impostazioni</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f0f2f5;
  --white: #ffffff;
  --border: #e2e5ea;
  --text: #111827;
  --sub: #6b7280;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --accent-hover: #1d4ed8;
  --danger: #ef4444;
  --danger-light: #fef2f2;
  --success: #10b981;
  --warn: #f59e0b;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ─── LAYOUT ─── */
#app { display: flex; min-height: 100vh; }

#sidebar {
  width: 260px;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 10;
}

.sidebar-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.app-icon { font-size: 22px; }

#nav-menu {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 12px;
  border: none;
  background: transparent;
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  transition: background 0.15s;
  width: 100%;
}

.nav-item:hover { background: var(--bg); }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.nav-icon { font-size: 18px; width: 24px; text-align: center; }
.nav-label { flex: 1; }

#main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; min-height: 100vh; }

#topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 5;
}

#back-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 34px; height: 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--white);
  font-size: 22px;
  cursor: pointer;
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
}

#back-btn:hover { background: var(--bg); }

#page-title {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -0.4px;
  flex: 1;
}

#content { padding: 24px; max-width: 760px; }

/* ─── HOME GRID ─── */
.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 12px;
}

.home-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.1s;
  box-shadow: var(--shadow);
}

.home-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.home-card-icon { font-size: 28px; }
.home-card-label { font-size: 13px; font-weight: 600; }

/* ─── SETTINGS ROWS ─── */
.setting-row {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 15px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 16px;
  box-shadow: var(--shadow);
}

.setting-row--column { flex-direction: column; align-items: stretch; gap: 12px; }
.setting-text { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.setting-label { font-size: 15px; font-weight: 500; }
.setting-sub { font-size: 12px; color: var(--sub); }
.slider-header { flex-direction: row; justify-content: space-between; align-items: center; }
.slider-value { font-size: 13px; font-weight: 600; color: var(--accent); }
.slider-input { width: 100%; height: 4px; border-radius: 4px; accent-color: var(--accent); cursor: pointer; }

.setting-select {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  outline: none;
  min-width: 160px;
}

.setting-select:focus { border-color: var(--accent); }

/* ─── TOGGLE ─── */
.toggle { position: relative; display: inline-block; width: 50px; height: 28px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute; inset: 0;
  background: #d1d5db;
  border-radius: 28px;
  transition: background 0.2s;
  cursor: pointer;
}
.toggle input:checked + .toggle-track { background: var(--accent); }
.toggle-thumb {
  position: absolute; top: 3px; left: 3px;
  width: 22px; height: 22px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
.toggle input:checked + .toggle-track .toggle-thumb { transform: translateX(22px); }

/* ─── PROFILE SYSTEM ─── */
.profiles-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 12px;
}

.profiles-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.profiles-list { display: flex; flex-direction: column; gap: 10px; }

.profile-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.15s;
  position: relative;
}

.profile-card.active-profile {
  border-color: var(--accent);
  background: var(--accent-light);
}

.profile-card:hover { box-shadow: var(--shadow-md); }

.profile-avatar {
  width: 54px; height: 54px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
  font-family: 'DM Mono', monospace;
}

.profile-info { flex: 1; min-width: 0; }
.profile-name { font-size: 16px; font-weight: 700; }
.profile-email, .profile-phone { font-size: 12px; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.profile-badge {
  font-size: 10px;
  font-weight: 700;
  background: var(--accent);
  color: white;
  padding: 2px 8px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.profile-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 16px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.35); }

.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }

.btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #fecaca; }
.btn-danger:hover { background: var(--danger); color: white; }

.btn-ghost { background: transparent; color: var(--sub); padding: 7px 10px; }
.btn-ghost:hover { background: var(--bg); color: var(--text); }

.btn-icon { padding: 8px; border-radius: 8px; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-xs { padding: 5px 9px; font-size: 11px; border-radius: 6px; }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.15s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(24px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

.modal {
  background: var(--white);
  border-radius: 18px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease;
  overflow: hidden;
}

.modal-header {
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.modal-close {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: none;
  background: var(--bg);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--sub);
  font-family: 'DM Sans', sans-serif;
}
.modal-close:hover { background: var(--border); }

.modal-body { padding: 24px; }

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  background: var(--bg);
}

/* ─── FORM ─── */
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }

.form-input, .form-select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  background: white;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.form-input:focus, .form-select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.avatar-picker {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.avatar-color {
  width: 36px; height: 36px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: transform 0.15s, border-color 0.15s;
}

.avatar-color:hover { transform: scale(1.1); }
.avatar-color.selected { border-color: var(--text); transform: scale(1.12); }

/* ─── CONFIRM DIALOG ─── */
.confirm-icon { font-size: 40px; text-align: center; margin-bottom: 14px; }
.confirm-text { text-align: center; font-size: 15px; color: var(--sub); line-height: 1.5; }
.confirm-name { font-weight: 700; color: var(--text); }

/* ─── BATTERY / STORAGE / INFO / APP unchanged ─── */
.battery-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}

.battery-visual { display: flex; align-items: center; gap: 2px; }
.battery-body { width: 80px; height: 36px; border: 2.5px solid #555; border-radius: 6px; padding: 3px; overflow: hidden; }
.battery-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.battery-cap { width: 5px; height: 14px; background: #555; border-radius: 0 3px 3px 0; }
.battery-pct { font-size: 22px; font-weight: 700; }
.battery-sub { font-size: 13px; color: var(--sub); margin-top: 4px; }

.storage-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 10px; box-shadow: var(--shadow); }
.storage-numbers { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
.storage-used { font-weight: 600; }
.storage-free { color: var(--sub); }
.storage-bar { display: flex; height: 14px; border-radius: 8px; overflow: hidden; background: var(--bg); margin-bottom: 14px; }
.storage-bar-seg { height: 100%; }
.storage-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.storage-legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--sub); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.app-list { display: flex; flex-direction: column; gap: 10px; }
.app-row { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); }
.app-name { font-size: 15px; font-weight: 500; }
.app-size { font-size: 12px; color: var(--sub); margin-top: 2px; }
.app-controls { display: flex; gap: 14px; align-items: center; }
.app-toggle-label { display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer; color: var(--sub); }
.app-toggle-label input { accent-color: var(--accent); cursor: pointer; width: 16px; height: 16px; }

.info-list { display: flex; flex-direction: column; gap: 2px; }
.info-row { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; box-shadow: var(--shadow); margin-bottom: 8px; }
.info-label { color: var(--sub); }
.info-value { font-weight: 500; font-family: 'DM Mono', monospace; font-size: 13px; }

/* ─── SECTION ACTIONS BAR ─── */
.section-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.section-actions-right { margin-left: auto; display: flex; gap: 8px; }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #111827;
  color: white;
  padding: 12px 22px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 500;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--sub);
}
.empty-state-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state-text { font-size: 15px; font-weight: 500; }
.empty-state-sub { font-size: 13px; margin-top: 6px; }

/* ─── SECTION HEADER ─── */
.section-divider {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--sub);
  padding: 14px 0 8px;
}

/* SCROLLBAR */
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

@media (max-width: 700px) {
  #sidebar { display: none; }
  #main { margin-left: 0; }
  #content { padding: 14px; }
  .home-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .storage-legend { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="app-icon">⚙️</span>
      <span class="app-title">Impostazioni</span>
    </div>
    <nav id="nav-menu"></nav>
  </div>

  <div id="main">
    <div id="topbar">
      <button id="back-btn" onclick="goBack()">‹</button>
      <h1 id="page-title">Impostazioni</h1>
    </div>
    <div id="content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// STATE
// ═══════════════════════════════════════
const state = {};
let currentSection = null;
let history = [];
let profiles = JSON.parse(JSON.stringify(defaultProfiles));

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init() {
  buildNav();
  renderHome();
}

function buildNav() {
  const nav = document.getElementById("nav-menu");
  nav.innerHTML = "";
  settingsData.sections.forEach(sec => {
    const btn = document.createElement("button");
    btn.className = "nav-item";
    btn.id = "nav-" + sec.id;
    btn.innerHTML = `<span class="nav-icon">${sec.icon}</span><span class="nav-label">${sec.label}</span>`;
    btn.onclick = () => openSection(sec.id);
    nav.appendChild(btn);
  });
}

function renderHome() {
  currentSection = null;
  document.getElementById("page-title").textContent = "Impostazioni";
  document.getElementById("back-btn").style.display = "none";
  document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));

  const content = document.getElementById("content");
  content.innerHTML = "";
  const grid = document.createElement("div");
  grid.className = "home-grid";

  settingsData.sections.forEach(sec => {
    const card = document.createElement("div");
    card.className = "home-card";
    card.innerHTML = `<span class="home-card-icon">${sec.icon}</span><span class="home-card-label">${sec.label}</span>`;
    card.onclick = () => openSection(sec.id);
    grid.appendChild(card);
  });

  content.appendChild(grid);
}

function openSection(id) {
  if (id === "profilo") { renderProfiles(); return; }
  const sec = settingsData.sections.find(s => s.id === id);
  if (!sec) return;

  history.push(currentSection);
  currentSection = id;

  document.getElementById("page-title").textContent = sec.label;
  document.getElementById("back-btn").style.display = "flex";
  document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
  const navBtn = document.getElementById("nav-" + id);
  if (navBtn) navBtn.classList.add("active");

  const content = document.getElementById("content");
  content.innerHTML = "";
  sec.items.forEach(item => content.appendChild(renderItem(item)));
}

function goBack() {
  const prev = history.pop();
  if (prev) { openSection(prev); history.pop(); }
  else renderHome();
}

// ═══════════════════════════════════════
// RENDER ITEMS
// ═══════════════════════════════════════
function renderItem(item) {
  switch (item.type) {
    case "toggle": return renderToggle(item);
    case "slider": return renderSlider(item);
    case "select": return renderSelect(item);
    case "battery-info": return renderBatteryInfo(item);
    case "storage-info": return renderStorageInfo(item);
    case "app-list": return renderAppList(item);
    case "info-list": return renderInfoList(item);
    default: return document.createElement("div");
  }
}

function renderToggle(item) {
  if (!state.hasOwnProperty(item.id)) state[item.id] = item.value;
  const row = document.createElement("div");
  row.className = "setting-row";
  row.innerHTML = `
    <div class="setting-text">
      <span class="setting-label">${item.label}</span>
      ${item.sublabel ? `<span class="setting-sub">${item.sublabel}</span>` : ""}
    </div>
    <label class="toggle">
      <input type="checkbox" ${state[item.id] ? "checked" : ""} onchange="toggleState('${item.id}', this.checked)">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
    </label>`;
  return row;
}

function toggleState(id, val) { state[id] = val; }

function renderSlider(item) {
  if (!state.hasOwnProperty(item.id)) state[item.id] = item.value;
  const row = document.createElement("div");
  row.className = "setting-row setting-row--column";
  row.innerHTML = `
    <div class="setting-text slider-header">
      <span class="setting-label">${item.label}</span>
      <span class="slider-value" id="val-${item.id}">${state[item.id]}${item.unit}</span>
    </div>
    <input class="slider-input" type="range" min="${item.min}" max="${item.max}" value="${state[item.id]}"
      oninput="updateSlider('${item.id}', this.value, '${item.unit}')">`;
  return row;
}

function updateSlider(id, val, unit) {
  state[id] = val;
  const el = document.getElementById("val-" + id);
  if (el) el.textContent = val + unit;
}

function renderSelect(item) {
  if (!state.hasOwnProperty(item.id)) state[item.id] = item.value;
  const row = document.createElement("div");
  row.className = "setting-row";
  const options = item.options.map(o =>
    `<option value="${o.value}" ${state[item.id] === o.value ? "selected" : ""}>${o.label}</option>`
  ).join("");
  row.innerHTML = `
    <span class="setting-label">${item.label}</span>
    <select class="setting-select" onchange="state['${item.id}'] = this.value">${options}</select>`;
  return row;
}

function renderBatteryInfo(item) {
  const wrap = document.createElement("div");
  wrap.className = "battery-card";
  const pct = item.level;
  const color = pct > 50 ? "#10b981" : pct > 20 ? "#f59e0b" : "#ef4444";
  wrap.innerHTML = `
    <div class="battery-visual">
      <div class="battery-body"><div class="battery-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="battery-cap"></div>
    </div>
    <div class="battery-details">
      <span class="battery-pct">${pct}%</span>
      <span class="battery-sub">${item.charging ? "⚡ In carica" : "Autonomia rimasta: " + item.timeLeft}</span>
    </div>`;
  return wrap;
}

function renderStorageInfo(item) {
  const free = item.total - item.used;
  const wrap = document.createElement("div");
  wrap.className = "storage-card";
  const bars = item.breakdown.map(b =>
    `<div class="storage-bar-seg" style="width:${(b.value/item.total*100).toFixed(1)}%;background:${b.color}" title="${b.label}: ${b.value} GB"></div>`
  ).join("");
  const legend = item.breakdown.map(b =>
    `<div class="storage-legend-item"><span class="legend-dot" style="background:${b.color}"></span>${b.label} <strong>${b.value} GB</strong></div>`
  ).join("");
  wrap.innerHTML = `
    <div class="storage-numbers">
      <span class="storage-used">${item.used} GB usati</span>
      <span class="storage-free">${free} GB liberi su ${item.total} GB</span>
    </div>
    <div class="storage-bar">${bars}</div>
    <div class="storage-legend">${legend}</div>`;
  return wrap;
}

function renderAppList(item) {
  const wrap = document.createElement("div");
  wrap.className = "app-list";
  item.apps.forEach(app => {
    const row = document.createElement("div");
    row.className = "app-row";
    const key = "app-" + app.name.replace(/\s+/g, "");
    if (!state.hasOwnProperty(key + "-notif")) state[key + "-notif"] = app.notifications;
    if (!state.hasOwnProperty(key + "-bg")) state[key + "-bg"] = app.background;
    row.innerHTML = `
      <div class="app-info">
        <span class="app-name">${app.name}</span>
        <span class="app-size">${app.size}</span>
      </div>
      <div class="app-controls">
        <label class="app-toggle-label">🔔
          <input type="checkbox" ${state[key+"-notif"] ? "checked" : ""} onchange="state['${key}-notif']=this.checked">
        </label>
        <label class="app-toggle-label">🔄
          <input type="checkbox" ${state[key+"-bg"] ? "checked" : ""} onchange="state['${key}-bg']=this.checked">
        </label>
      </div>`;
    wrap.appendChild(row);
  });
  return wrap;
}

function renderInfoList(item) {
  const wrap = document.createElement("div");
  wrap.className = "info-list";
  item.infos.forEach(info => {
    const row = document.createElement("div");
    row.className = "info-row";
    row.innerHTML = `<span class="info-label">${info.label}</span><span class="info-value">${info.value}</span>`;
    wrap.appendChild(row);
  });
  return wrap;
}

// PROFILE SYSTEM

function renderProfiles() {
  history.push(currentSection);
  currentSection = "profilo";

  document.getElementById("page-title").textContent = "Profilo";
  document.getElementById("back-btn").style.display = "flex";
  document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
  const navBtn = document.getElementById("nav-profilo");
  if (navBtn) navBtn.classList.add("active");

  refreshProfilesView();
}

function refreshProfilesView() {
  const content = document.getElementById("content");
  content.innerHTML = "";

  // Header + Add button
  const header = document.createElement("div");
  header.className = "profiles-header";
  header.innerHTML = `
    <span class="profiles-title">Profili (${profiles.length})</span>
    <button class="btn btn-primary" onclick="openAddProfileModal()">
      ＋ Aggiungi profilo
    </button>`;
  content.appendChild(header);

  if (profiles.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.innerHTML = `
      <div class="empty-state-icon">👤</div>
      <div class="empty-state-text">Nessun profilo creato</div>
      <div class="empty-state-sub">Aggiungi il primo profilo per iniziare</div>`;
    content.appendChild(empty);
    return;
  }

  const list = document.createElement("div");
  list.className = "profiles-list";

  profiles.forEach(profile => {
    const card = document.createElement("div");
    card.className = "profile-card" + (profile.active ? " active-profile" : "");
    card.innerHTML = `
      <div class="profile-avatar" style="background:${profile.color}">${profile.name.charAt(0).toUpperCase()}</div>
      <div class="profile-info">
        <div class="profile-name">${escHtml(profile.name)}</div>
        <div class="profile-email">${escHtml(profile.email)}</div>
        <div class="profile-phone">${escHtml(profile.phone)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
        ${profile.active ? '<span class="profile-badge">Attivo</span>' : `<button class="btn btn-secondary btn-xs" onclick="setActiveProfile('${profile.id}')">Imposta attivo</button>`}
        <div class="profile-actions">
          <button class="btn btn-ghost btn-icon btn-xs" title="Modifica" onclick="openEditProfileModal('${profile.id}')">✏️</button>
          <button class="btn btn-danger btn-xs" title="Elimina" onclick="openDeleteProfileModal('${profile.id}')">🗑️ Elimina</button>
        </div>
      </div>`;
    list.appendChild(card);
  });

  content.appendChild(list);
}

function setActiveProfile(id) {
  profiles.forEach(p => p.active = p.id === id);
  refreshProfilesView();
  showToast("✅ Profilo attivo aggiornato");
}

function selectAvatarColor(el) {
  document.querySelectorAll(".avatar-color").forEach(e => e.classList.remove("selected"));
  el.classList.add("selected");
}

function saveNewProfile() {
  const name = document.getElementById("f-name").value.trim();
  const email = document.getElementById("f-email").value.trim();
  const phone = document.getElementById("f-phone").value.trim();
  const role = document.getElementById("f-role").value;
  const colorEl = document.querySelector(".avatar-color.selected");
  const color = colorEl ? colorEl.dataset.color : AVATAR_COLORS[0];

  if (!name) { shakeInput("f-name"); return; }
  if (!email || !email.includes("@")) { shakeInput("f-email"); return; }

  const newProfile = {
    id: "p" + Date.now(),
    name, email,
    phone: phone || "Non specificato",
    role, color,
    active: profiles.length === 0
  };

  profiles.push(newProfile);
  closeModal();
  refreshProfilesView();
  showToast("✅ Profilo \"" + name + "\" creato!");
}

// ─── EDIT PROFILE MODAL ───
function openEditProfileModal(id) {
  const p = profiles.find(x => x.id === id);
  if (!p) return;

  showModal(`
    <div class="modal-header">
      <span class="modal-title">✏️ Modifica profilo</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nome completo *</label>
        <input class="form-input" id="ef-name" value="${escHtml(p.name)}" maxlength="50">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email *</label>
          <input class="form-input" id="ef-email" type="email" value="${escHtml(p.email)}">
        </div>
        <div class="form-group">
          <label class="form-label">Telefono</label>
          <input class="form-input" id="ef-phone" value="${escHtml(p.phone)}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Ruolo</label>
        <select class="form-select" id="ef-role">
          ${["Utente","Amministratore","Ospite","Bambino","Lavoro"].map(r =>
            `<option value="${r}" ${p.role===r?"selected":""}>${r === "Bambino" ? "Profilo bambino" : r === "Lavoro" ? "Profilo lavoro" : r}</option>`
          ).join("")}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Colore avatar</label>
        <div class="avatar-picker" id="avatar-picker">
          ${AVATAR_COLORS.map(c => `<div class="avatar-color ${c===p.color?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectAvatarColor(this)"></div>`).join("")}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="saveEditProfile('${id}')">✓ Salva modifiche</button>
    </div>
  `);
}

function saveEditProfile(id) {
  const p = profiles.find(x => x.id === id);
  if (!p) return;

  const name = document.getElementById("ef-name").value.trim();
  const email = document.getElementById("ef-email").value.trim();
  const phone = document.getElementById("ef-phone").value.trim();
  const role = document.getElementById("ef-role").value;
  const colorEl = document.querySelector(".avatar-color.selected");
  const color = colorEl ? colorEl.dataset.color : p.color;

  if (!name) { shakeInput("ef-name"); return; }
  if (!email || !email.includes("@")) { shakeInput("ef-email"); return; }

  p.name = name;
  p.email = email;
  p.phone = phone || p.phone;
  p.role = role;
  p.color = color;

  closeModal();
  refreshProfilesView();
  showToast("✅ Profilo aggiornato!");
}

        Questa azione non può essere annullata.
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
      <button class="btn btn-danger" onclick="deleteProfile('${id}')">🗑️ Elimina definitivamente</button>
    </div>
  `);
}

function deleteProfile(id) {
  const p = profiles.find(x => x.id === id);
  const wasActive = p && p.active;
  profiles = profiles.filter(x => x.id !== id);

  if (wasActive && profiles.length > 0) profiles[0].active = true;

  closeModal();
  refreshProfilesView();
  showToast("🗑️ Profilo eliminato");
}

// ═══════════════════════════════════════
// MODAL SYSTEM
// ═══════════════════════════════════════
function showModal(html) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "modal-overlay";
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };

  const modal = document.createElement("div");
  modal.className = "modal";
  modal.innerHTML = html;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function closeModal() {
  const overlay = document.getElementById("modal-overlay");
  if (overlay) overlay.remove();
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

function shakeInput(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.borderColor = "var(--danger)";
  el.style.animation = "none";
  requestAnimationFrame(() => {
    el.style.animation = "shake 0.3s ease";
  });
  el.focus();
  setTimeout(() => { el.style.borderColor = ""; }, 1500);
}

const shakeStyle = document.createElement("style");
shakeStyle.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }`;
document.head.appendChild(shakeStyle);

window.addEventListener("DOMContentLoaded", init);
</script>
</body>
