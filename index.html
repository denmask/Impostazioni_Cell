<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Impostazioni Cellulare</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f0f2f5;
  --white: #ffffff;
  --border: #e2e5ea;
  --text: #111827;
  --sub: #6b7280;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --danger: #ef4444;
  --danger-light: #fef2f2;
  --success: #10b981;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
}
body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); }
#app { display: flex; min-height: 100vh; }
#sidebar { width: 260px; background: var(--white); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 10; }
.sidebar-header { display: flex; align-items: center; gap: 10px; padding: 20px 18px; border-bottom: 1px solid var(--border); font-size: 17px; font-weight: 700; }
#nav-menu { padding: 10px; display: flex; flex-direction: column; gap: 2px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border: none; background: transparent; border-radius: 10px; cursor: pointer; text-align: left; font-size: 14px; width: 100%; }
.nav-item:hover { background: var(--bg); }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.nav-icon { font-size: 18px; width: 24px; }
#main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; min-height: 100vh; }
#topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 5; }
#back-btn { display: none; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); font-size: 22px; cursor: pointer; }
#page-title { font-size: 19px; font-weight: 700; flex: 1; }
#content { padding: 24px; max-width: 760px; }
.home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
.home-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 16px; cursor: pointer; transition: box-shadow 0.15s; box-shadow: var(--shadow); }
.home-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.home-card-icon { font-size: 28px; display: block; margin-bottom: 10px; }
.home-card-label { font-size: 13px; font-weight: 600; }
.setting-row { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 16px; }
.setting-text { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.setting-label { font-size: 15px; font-weight: 500; }
.setting-sub { font-size: 12px; color: var(--sub); }
.slider-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
.slider-input { width: 100%; height: 4px; accent-color: var(--accent); cursor: pointer; }
.setting-select { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 14px; background: var(--bg); cursor: pointer; min-width: 160px; }
.toggle { position: relative; display: inline-block; width: 50px; height: 28px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track { position: absolute; inset: 0; background: #d1d5db; border-radius: 28px; transition: background 0.2s; cursor: pointer; }
.toggle input:checked + .toggle-track { background: var(--accent); }
.toggle-thumb { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: white; border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked + .toggle-track .toggle-thumb { transform: translateX(22px); }
.profiles-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
.profiles-title { font-size: 13px; font-weight: 600; color: var(--sub); text-transform: uppercase; }
.profile-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
.profile-card.active-profile { border-color: var(--accent); background: var(--accent-light); }
.profile-avatar { width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: white; flex-shrink: 0; }
.profile-info { flex: 1; }
.profile-name { font-size: 16px; font-weight: 700; }
.profile-email { font-size: 12px; color: var(--sub); }
.profile-badge { font-size: 10px; font-weight: 700; background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--danger-light); color: var(--danger); }
.btn-xs { padding: 5px 9px; font-size: 11px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; }
.modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 480px; overflow: hidden; }
.modal-header { padding: 22px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--bg); }
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px; }
.form-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; }
.battery-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
.battery-body { width: 80px; height: 36px; border: 2.5px solid #555; border-radius: 6px; padding: 3px; display: flex; align-items: center; }
.battery-fill { height: 100%; border-radius: 3px; }
.battery-pct { font-size: 22px; font-weight: 700; }
.storage-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 10px; }
.storage-bar { display: flex; height: 14px; border-radius: 8px; overflow: hidden; background: var(--bg); margin: 12px 0; }
.storage-bar-seg { height: 100%; }
.info-row { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; justify-content: space-between; margin-bottom: 8px; }
.info-label { color: var(--sub); }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #111827; color: white; padding: 12px 22px; border-radius: 40px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 999; }
.toast.show { opacity: 1; }
.loading { text-align: center; padding: 40px; color: var(--sub); }
@media (max-width: 700px) { #sidebar { display: none; } #main { margin-left: 0; } }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-header"><span class="app-icon">⚙️</span><span>Impostazioni</span></div>
    <nav id="nav-menu"></nav>
  </div>
  <div id="main">
    <div id="topbar">
      <button id="back-btn" onclick="goBack()">←</button>
      <h1 id="page-title">Impostazioni</h1>
    </div>
    <div id="content"><div class="loading">⏳ Caricamento...</div></div>
  </div>
</div>
<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsjC_CajNEfxceYohu5xGc4WbwQUrVkeA",
  authDomain: "impostazioni-cell.firebaseapp.com",
  projectId: "impostazioni-cell",
  storageBucket: "impostazioni-cell.firebasestorage.app",
  messagingSenderId: "1013453050766",
  appId: "1:1013453050766:web:c11ae96fbe5771136bcadf",
  measurementId: "G-MY3G8ZVC9H"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let profiles = [];
let history = [];

const AVATAR_COLORS = ["#2563eb","#7c3aed","#db2777","#ea580c","#16a34a","#0891b2","#9333ea","#dc2626"];

const sections = [
  { id: "profilo", label: "Profilo", icon: "👤" },
  { id: "rete", label: "Rete e Internet", icon: "📶" },
  { id: "display", label: "Display", icon: "☀️" },
  { id: "suono", label: "Suono", icon: "🔊" },
  { id: "batteria", label: "Batteria", icon: "🔋" },
  { id: "archiviazione", label: "Archiviazione", icon: "💾" },
  { id: "privacy", label: "Privacy", icon: "🔒" },
  { id: "info", label: "Info dispositivo", icon: "ℹ️" }
];

async function loadProfiles() {
  try {
    const querySnapshot = await getDocs(collection(db, "profili"));
    profiles = [];
    querySnapshot.forEach((doc) => {
      const data = doc.data();
      profiles.push({ 
        id: doc.id, 
        name: data.name || data.nome || "Senza nome",
        email: data.email || "",
        color: data.color || AVATAR_COLORS[0],
        active: data.active === true
      });
    });
    
    if (profiles.length === 0) {
      const defaultProfile = { name: "Mario Rossi", email: "mario@email.com", color: "#2563eb", active: true };
      const docRef = await addDoc(collection(db, "profili"), defaultProfile);
      profiles.push({ id: docRef.id, ...defaultProfile });
    }
    
    console.log("✅ Profili caricati:", profiles.length);
    return profiles;
  } catch (error) {
    console.error("❌ Errore caricamento profili:", error);
    showToast("Errore connessione Firebase");
    return [];
  }
}

async function saveProfile(profile) {
  try {
    const profileRef = doc(db, "profili", profile.id);
    await setDoc(profileRef, {
      name: profile.name,
      email: profile.email,
      color: profile.color,
      active: profile.active || false
    });
    showToast("✅ Profilo salvato!");
  } catch (error) {
    console.error("Errore salvataggio:", error);
    showToast("Errore salvataggio");
  }
}

async function deleteProfileFromFirebase(id) {
  try {
    await deleteDoc(doc(db, "profili", id));
    showToast("🗑️ Profilo eliminato");
  } catch (error) {
    console.error("Errore eliminazione:", error);
  }
}

window.showToast = (msg) => {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
};

window.goBack = () => {
  history.pop();
  renderHome();
};

window.openSection = (id) => {
  if (id === "profilo") {
    renderProfiles();
    return;
  }
  const section = sections.find(s => s.id === id);
  if (section) document.getElementById("page-title").textContent = section.label;
  document.getElementById("back-btn").style.display = "flex";
  const content = document.getElementById("content");
  content.innerHTML = renderSectionContent(id);
};

function renderSectionContent(id) {
  if (id === "rete") {
    return `
      <div class="setting-row"><div class="setting-text"><span class="setting-label">Wi-Fi</span><span class="setting-sub">HomeNetwork</span></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>
      <div class="setting-row"><div class="setting-text"><span class="setting-label">Dati mobili</span></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>
      <div class="setting-row"><div class="setting-text"><span class="setting-label">Bluetooth</span></div><label class="toggle"><input type="checkbox"><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>
      <div class="setting-row"><div class="setting-text"><span class="setting-label">Modalità aereo</span></div><label class="toggle"><input type="checkbox"><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>`;
  }
  if (id === "display") {
    return `
      <div class="setting-row setting-row--column"><div class="slider-header"><span class="setting-label">Luminosità</span><span class="slider-value">70%</span></div><input type="range" class="slider-input" min="0" max="100" value="70"></div>
      <div class="setting-row"><div class="setting-text"><span class="setting-label">Luminosità automatica</span></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>
      <div class="setting-row"><span class="setting-label">Spegnimento schermo</span><select class="setting-select"><option>30 secondi</option><option>1 minuto</option></select></div>`;
  }
  if (id === "suono") {
    return `
      <div class="setting-row setting-row--column"><div class="slider-header"><span class="setting-label">Volume</span><span class="slider-value">80%</span></div><input type="range" class="slider-input" min="0" max="100" value="80"></div>
      <div class="setting-row"><div class="setting-text"><span class="setting-label">Vibrazione</span></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>`;
  }
  if (id === "batteria") {
    return `<div class="battery-card"><div class="battery-body"><div class="battery-fill" style="width:78%; background:#10b981; height:100%; border-radius:3px;"></div></div><span class="battery-pct">78%</span></div>`;
  }
  if (id === "archiviazione") {
    return `<div class="storage-card"><div class="storage-bar"><div class="storage-bar-seg" style="width:22%; background:#2563eb"></div><div class="storage-bar-seg" style="width:17%; background:#ef4444"></div><div class="storage-bar-seg" style="width:19%; background:#e2e5ea"></div></div><div>Usati: 74GB / 128GB</div></div>`;
  }
  if (id === "privacy") {
    return `
      <div class="setting-row"><div class="setting-text"><span class="setting-label">Posizione</span></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>
      <div class="setting-row"><div class="setting-text"><span class="setting-label">Impronta digitale</span></div><label class="toggle"><input type="checkbox"><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>`;
  }
  if (id === "info") {
    return `<div class="info-row"><span class="info-label">Modello</span><span>Galaxy S24</span></div>
            <div class="info-row"><span class="info-label">Android</span><span>14</span></div>
            <div class="info-row"><span class="info-label">IMEI</span><span>352000000123456</span></div>`;
  }
  return "<div>Sezione in costruzione</div>";
}

async function renderProfiles() {
  document.getElementById("page-title").textContent = "Gestione Profili";
  document.getElementById("back-btn").style.display = "flex";
  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="profiles-header"><span class="profiles-title">Account</span><button class="btn btn-primary" onclick="window.showAddModal()">+ Aggiungi</button></div>
    <div id="profiles-list"><div class="loading">⏳ Caricamento...</div></div>`;
  await updateProfilesList();
}

async function updateProfilesList() {
  const container = document.getElementById("profiles-list");
  if (!container) return;
  
  await loadProfiles();
  
  if (profiles.length === 0) {
    container.innerHTML = '<div class="loading">📭 Nessun profilo. Aggiungine uno!</div>';
    return;
  }
  
  container.innerHTML = profiles.map(p => {
    const firstChar = p.name && p.name.length > 0 ? p.name.charAt(0).toUpperCase() : "?";
    return `
    <div class="profile-card ${p.active ? 'active-profile' : ''}">
      <div class="profile-avatar" style="background:${p.color}">${firstChar}</div>
      <div class="profile-info">
        <div class="profile-name">${p.name || "Senza nome"} ${p.active ? '<span class="profile-badge">Attivo</span>' : ''}</div>
        <div class="profile-email">${p.email || ""}</div>
      </div>
      <div class="profile-actions">
        ${!p.active ? `<button class="btn btn-xs btn-secondary" onclick="window.setActive('${p.id}')">Usa</button>` : ''}
        <button class="btn btn-xs btn-danger" onclick="window.deleteProfile('${p.id}')">Elimina</button>
      </div>
    </div>`;
  }).join("");
}

window.setActive = async (id) => {
  for (let p of profiles) {
    p.active = (p.id === id);
    await saveProfile(p);
  }
  showToast("✅ Profilo attivato");
  await updateProfilesList();
};

window.deleteProfile = async (id) => {
  if (profiles.length === 1) {
    showToast("⚠️ Non puoi eliminare l'ultimo profilo");
    return;
  }
  const toDelete = profiles.find(p => p.id === id);
  if (toDelete?.active) {
    showToast("⚠️ Non puoi eliminare il profilo attivo");
    return;
  }
  await deleteProfileFromFirebase(id);
  await updateProfilesList();
};

window.showAddModal = () => {
  const modal = document.createElement("div");
  modal.className = "modal-overlay";
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header"><span style="font-weight:700">Nuovo Profilo</span><button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:24px;cursor:pointer">×</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Nome</label><input type="text" id="newName" class="form-input" placeholder="Mario Rossi"></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" id="newEmail" class="form-input" placeholder="email@example.com"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Annulla</button>
        <button class="btn btn-primary" onclick="window.saveNewProfile()">Salva</button>
      </div>
    </div>`;
  document.getElementById("modal-container").appendChild(modal);
};

window.saveNewProfile = async () => {
  const nameInput = document.getElementById("newName");
  const emailInput = document.getElementById("newEmail");
  
  if (!nameInput || !emailInput) {
    showToast("Errore: campi non trovati");
    return;
  }
  
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  
  if (!name || !email) {
    showToast("❌ Compila tutti i campi");
    return;
  }
  
  const newProfile = {
    name: name,
    email: email,
    color: AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)],
    active: false
  };
  
  try {
    const docRef = await addDoc(collection(db, "profili"), newProfile);
    profiles.push({ id: docRef.id, ...newProfile });
    const modal = document.querySelector(".modal-overlay");
    if (modal) modal.remove();
    await updateProfilesList();
    showToast("✅ Profilo aggiunto con successo!");
  } catch (error) {
    console.error("Errore:", error);
    showToast("❌ Errore durante il salvataggio: " + error.message);
  }
};

window.renderHome = () => {
  document.getElementById("page-title").textContent = "Impostazioni";
  document.getElementById("back-btn").style.display = "none";
  const content = document.getElementById("content");
  content.innerHTML = `<div class="home-grid"></div>`;
  const grid = content.querySelector(".home-grid");
  sections.forEach(s => {
    const card = document.createElement("div");
    card.className = "home-card";
    card.innerHTML = `<span class="home-card-icon">${s.icon}</span><span class="home-card-label">${s.label}</span>`;
    card.onclick = () => window.openSection(s.id);
    grid.appendChild(card);
  });
};

async function init() {
  const nav = document.getElementById("nav-menu");
  sections.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "nav-item";
    btn.innerHTML = `<span class="nav-icon">${s.icon}</span><span class="nav-label">${s.label}</span>`;
    btn.onclick = () => window.openSection(s.id);
    nav.appendChild(btn);
  });
  
  await loadProfiles();
  renderHome();
  showToast("✅ Firebase connesso!");
}

window.saveNewProfile = window.saveNewProfile;
window.showAddModal = window.showAddModal;
window.setActive = window.setActive;
window.deleteProfile = window.deleteProfile;

init();
</script>
</body>
</html>
